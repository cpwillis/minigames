name = "minigames-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
workers_dev = false

# custom_domain = true makes Cloudflare create and manage the DNS record automatically.
# A plain zone route does NOT create DNS, which is why api.minigames.cpwillis.dev never resolved.
routes = [
  { pattern = "api.minigames.cpwillis.dev", custom_domain = true }
]

[[d1_databases]]
binding = "DB"
database_name = "minigames-db"
# Local dev (`npm run dev`) ignores this id and uses a local SQLite file under .wrangler/.
database_id = "142bbafd-2e73-486c-a914-f93d1b84de83"
